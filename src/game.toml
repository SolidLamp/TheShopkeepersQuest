[140]
Text = "You are a travelling merchant, approaching a new village to sell your wares in another region.\\nAs you approach the village, the atmosphere seems odd and eerily silent, almost frightening in a way. \\nSuddently, a man appears, and walks in your direction.\\nThe man speaks, \\033[93m'Greetings. I'm a local shopkeeper, just on the outskirts of our little village.\\nMany come for my high-quality wares, but none have done such today, for a mystical spell has bewitched them.\\nAny that resided within the main parts of the village limits last night have disappeared.'\\033[0m\nThe man grunts and scratches his chin.\\nHe looks back at the village with a longing expression, before turning his gaze back to you. \\n\\033[93m'It worries me, you know?'\\033[0m he continues, \\033[93m'There's an old legend that if all seems to disappear overnight, then it marks a dark path for the world.'\\033[0m\nThe man sighs deeply, and waits a moment before speaking again, \\033[93m'I do have some experience with magic.\\nI can reverse it, but I need 3 mystical items; the first, a rusted sword; the second, an amber necklace; and the third, a golden idol.\\nWith those three items, I believe I can bring everything back to normal.\\nI would get them myself, but my adventuring days are behind me.\\nIf it helps, I believe the bazaar was unaffected - it, too, was beyond the main limits of the village.\\nWhen you obtain the items, come see me in my shop.\\nI shall be seeing you, then.'\\033[0m\\nThe man leaves.\\n"
TextSpeed = 0.015
Desc = "Opening Cutscene"
titlebarCentre = "{title}"
Options = ['Continue']
Inventory = false
Move = [1]

